<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#101018" />
    <title>KeyInSight</title>
    <style>
      /* Bootstrap-only styling. All visible UI (buttons, labels, panels,
         status text) is painted by agg-gui into the canvas — per the
         agg-gui-only architecture rule in docs/architecture.md. The
         HTML/CSS here only owns the canvas placement. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: #101018;
        color: #e7e7f0;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
        overflow: hidden;
        height: 100%;
        height: 100dvh;
        width: 100%;
        overscroll-behavior: none;
        touch-action: none;
      }
      body {
        height: 100dvh;
      }
      #keyinsight-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <canvas id="keyinsight-canvas" width="1200" height="800"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
